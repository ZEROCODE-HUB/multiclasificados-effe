<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- Sin `maximum-scale`/`user-scalable=no`: bloquear el zoom impide ampliar a
         quien lo necesita para leer (WCAG 1.4.4). El `viewport-fit=cover` sí se
         mantiene: es lo que respeta el notch/barra de gestos en el APK. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Favicon (icono de la pestaña del navegador) e iconos PWA -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#192F5E" />
    <!-- Solo tema claro. Va en el <head> para que el navegador lo sepa antes de
         pintar: si espera al CSS, los controles nativos parpadean en oscuro. -->
    <meta name="color-scheme" content="light" />
    <title>eFFe Multiclasificados | Avisos Clasificados en Perú</title>
    <meta name="description" content="Plataforma líder de avisos clasificados en Perú. Publica y encuentra inmuebles, vehículos, empleos, servicios y más.">
    <meta name="author" content="eFFe Multiclasificados" />
    
    
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/39648cc1-9a8a-4219-b280-397ecf739c08/id-preview-49e6211e--f69541d8-6bb3-4078-ad62-4a2e0a6de15a.lovable.app-1773247395129.png">

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/39648cc1-9a8a-4219-b280-397ecf739c08/id-preview-49e6211e--f69541d8-6bb3-4078-ad62-4a2e0a6de15a.lovable.app-1773247395129.png">
    <meta property="og:title" content="eFFe Multiclasificados | Avisos Clasificados en Perú">
  <meta name="twitter:title" content="eFFe Multiclasificados | Avisos Clasificados en Perú">
  <meta property="og:description" content="Plataforma líder de avisos clasificados en Perú. Publica y encuentra inmuebles, vehículos, empleos, servicios y más.">
  <meta name="twitter:description" content="Plataforma líder de avisos clasificados en Perú. Publica y encuentra inmuebles, vehículos, empleos, servicios y más.">
</head>

  <body>
    <!-- Pantalla de carga inicial (se muestra hasta que React monta; evita el blanco) -->
    <style>
      #boot-loader{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:#ffffff;z-index:9999;}
      #boot-loader .brand{font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:26px;letter-spacing:1px;color:#1e3a5f;}
      #boot-loader .brand b{color:#f97316;}
      #boot-loader .spin{width:34px;height:34px;border:3px solid #e5e7eb;border-top-color:#f97316;border-radius:50%;animation:bspin .8s linear infinite;}
      @keyframes bspin{to{transform:rotate(360deg)}}
    </style>
    <div id="root">
      <div id="boot-loader">
        <div class="brand">eFFe <b>Multiclasificados</b></div>
        <div class="spin"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
