workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.effe.multiclasificados
      node: 22
      vars:
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build React app
        script: npm run build
        env:
          VITE_SUPABASE_URL: $CM_VITE_SUPABASE_URL
          VITE_SUPABASE_ANON_KEY: $CM_VITE_SUPABASE_ANON_KEY
      - name: Add iOS platform
        script: npx cap add ios
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme $XCODE_SCHEME \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive
      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme $XCODE_SCHEME
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true